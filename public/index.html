<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrashSafe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://unpkg.com/antd@5/dist/reset.css" />
    <style>
      :root {
        --page-bg: #f3f6f8;
        --page-tint: #eef8f4;
        --ink: #10212b;
        --muted: #6f8391;
        --panel: rgba(255, 255, 255, 0.84);
        --panel-strong: #ffffff;
        --line: rgba(16, 33, 43, 0.1);
        --shadow: 0 24px 80px rgba(16, 33, 43, 0.08);
        --teal: #1f9d77;
        --teal-soft: #dff5ed;
        --gold-soft: #fff4d8;
        --red-soft: #fff0ec;
        --blue-soft: #ebf6ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family: "Plus Jakarta Sans", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at top left,
            rgba(31, 157, 119, 0.11),
            transparent 22%
          ),
          radial-gradient(
            circle at top right,
            rgba(98, 168, 220, 0.11),
            transparent 20%
          ),
          linear-gradient(
            180deg,
            var(--page-tint) 0%,
            var(--page-bg) 42%,
            #f7f8fa 100%
          );
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(16, 33, 43, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(16, 33, 43, 0.03) 1px, transparent 1px);
        background-size: 32px 32px;
        mask-image: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.4),
          transparent 75%
        );
      }

      .app-shell {
        min-height: 100vh;
        padding: 24px;
        position: relative;
        z-index: 1;
      }

      .page-wrap {
        max-width: 1320px;
        margin: 0 auto;
      }

      .hero-card,
      .surface-card,
      .db-card,
      .history-card {
        backdrop-filter: blur(16px);
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.68);
        box-shadow: var(--shadow);
      }

      .hero-card {
        overflow: hidden;
        border-radius: 32px;
        background: linear-gradient(
          140deg,
          rgba(255, 255, 255, 0.93),
          rgba(247, 252, 249, 0.88) 48%,
          rgba(235, 246, 255, 0.92)
        );
      }

      .hero-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }

      .hero-kicker {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(31, 157, 119, 0.08);
        color: #157457;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }

      .hero-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.9fr);
        gap: 24px;
        align-items: stretch;
      }

      .hero-copy {
        padding-right: 8px;
      }

      .hero-copy h1 {
        margin: 0;
        font-size: clamp(36px, 6vw, 64px);
        line-height: 0.95;
        letter-spacing: -0.06em;
        font-weight: 800;
        color: #10212b;
      }

      .hero-copy p {
        margin: 18px 0 0;
        max-width: 720px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.72;
      }

      .hero-rail {
        display: grid;
        gap: 14px;
      }

      .hero-rail-card {
        border-radius: 24px;
        padding: 18px 20px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
      }

      .hero-rail-card .eyebrow {
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: #7f95a3;
        margin-bottom: 10px;
      }

      .hero-rail-card .value {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: #10212b;
      }

      .hero-rail-card .hint {
        margin-top: 6px;
        color: var(--muted);
        line-height: 1.6;
        font-size: 13px;
      }

      .section-block {
        margin-top: 22px;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .section-label {
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-weight: 800;
        color: #6f8391;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 14px;
      }

      .surface-card {
        border-radius: 24px;
      }

      .metric-card {
        border-radius: 24px;
        min-height: 148px;
        overflow: hidden;
      }

      .metric-card.teal {
        background: linear-gradient(180deg, #ffffff, #f4fcf8);
      }

      .metric-card.blue {
        background: linear-gradient(180deg, #ffffff, #f4f9ff);
      }

      .metric-card.gold {
        background: linear-gradient(180deg, #ffffff, #fffaf0);
      }

      .metric-card.red {
        background: linear-gradient(180deg, #ffffff, #fff6f4);
      }

      .metric-card .ant-statistic {
        height: 100%;
      }

      .metric-card .ant-statistic-content {
        font-size: 30px;
        font-weight: 800;
        letter-spacing: -0.05em;
        color: #10212b;
      }

      .metric-card .ant-statistic-title {
        color: #7a8b95;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin-bottom: 18px;
      }

      .metric-sub {
        margin-top: 14px;
        font-size: 13px;
        line-height: 1.5;
        color: var(--muted);
      }

      .db-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .db-card {
        border-radius: 28px;
        overflow: hidden;
      }

      .db-card .ant-card-body {
        padding: 22px;
      }

      .db-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .db-title {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .db-name {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: #10212b;
      }

      .db-meta {
        margin-top: 10px;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.6;
      }

      .db-count {
        min-width: 132px;
        padding: 14px 16px;
        border-radius: 20px;
        background: rgba(16, 33, 43, 0.03);
        border: 1px solid rgba(16, 33, 43, 0.06);
        text-align: right;
      }

      .db-count .big {
        font-size: 30px;
        font-weight: 800;
        letter-spacing: -0.05em;
        line-height: 1;
      }

      .db-count .small {
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .action-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 10px;
      }

      .action-grid .ant-btn {
        height: 42px;
        border-radius: 14px;
        font-weight: 700;
      }

      .db-help {
        margin-top: 18px;
      }

      .db-help .ant-list-item {
        padding: 12px 0;
        align-items: flex-start;
      }

      .db-help .item-title {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
        color: #10212b;
        margin-bottom: 4px;
      }

      .db-help .item-copy {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.65;
      }

      .chain-note {
        margin-top: 16px;
        border-radius: 18px;
        padding: 16px 18px;
        background: var(--blue-soft);
        border: 1px solid rgba(98, 168, 220, 0.14);
      }

      .chain-note strong {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: #174965;
        letter-spacing: 0.02em;
      }

      .chain-note span {
        color: #5a6f7d;
        font-size: 13px;
        line-height: 1.65;
      }

      .history-card {
        border-radius: 20px;
        margin-top: 16px;
      }

      .history-card .ant-card-body {
        padding: 14px 16px 8px;
      }

      .history-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }

      .history-title span {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-weight: 800;
        color: #7a8b95;
      }

      .mono {
        font-family: "IBM Plex Mono", monospace;
      }

      .empty-hint {
        color: var(--muted);
        font-size: 13px;
        padding: 6px 0 10px;
      }

      .overlay-meta {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .overlay-meta-line {
        color: #5e7381;
        line-height: 1.7;
        font-size: 13px;
      }

      .overlay-meta-line strong {
        color: #10212b;
      }

      .restore-select-label {
        display: block;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: #7a8b95;
        margin-bottom: 10px;
      }

      .custom-table .ant-table {
        background: transparent;
      }

      .custom-table .ant-table-thead > tr > th {
        background: transparent;
        color: #7a8b95;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .custom-table .ant-table-tbody > tr > td {
        font-size: 13px;
        color: #203541;
      }

      .footer-note {
        margin-top: 24px;
        text-align: center;
        color: #7c8b95;
        font-size: 13px;
      }

      @media (max-width: 1100px) {
        .hero-grid,
        .db-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 768px) {
        .app-shell {
          padding: 14px;
        }

        .hero-card .ant-card-body,
        .surface-card .ant-card-body,
        .db-card .ant-card-body {
          padding: 18px;
        }

        .hero-copy h1 {
          font-size: 42px;
        }

        .hero-topbar,
        .db-header {
          flex-direction: column;
          align-items: stretch;
        }

        .db-count {
          text-align: left;
          min-width: 0;
        }

        .action-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/dayjs/dayjs.min.js"></script>
    <script src="https://unpkg.com/antd@5/dist/antd.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const {
        Alert,
        App: AntdApp,
        Badge,
        Button,
        Card,
        Col,
        ConfigProvider,
        Divider,
        Layout,
        List,
        Modal,
        Progress,
        Row,
        Select,
        Space,
        Statistic,
        Table,
        Tag,
        Typography,
        theme,
      } = antd;

      const { useEffect, useMemo, useRef, useState } = React;
      const { Content } = Layout;
      const { Title, Text, Paragraph } = Typography;

      function formatBytes(bytes) {
        if (bytes == null || Number.isNaN(bytes)) return "—";
        if (bytes === 0) return "0 B";
        const units = ["B", "KB", "MB", "GB", "TB"];
        const index = Math.min(
          units.length - 1,
          Math.floor(Math.log(bytes) / Math.log(1024)),
        );
        const value = bytes / Math.pow(1024, index);
        return (
          (value >= 100 ? value.toFixed(0) : value.toFixed(1)) +
          " " +
          units[index]
        );
      }

      function formatRelativeTime(iso) {
        if (!iso) return "Never";
        const when = new Date(iso);
        const ago = Math.max(
          0,
          Math.round((Date.now() - when.getTime()) / 1000),
        );
        if (ago < 60) return ago + "s ago";
        if (ago < 3600) return Math.round(ago / 60) + "m ago";
        if (ago < 86400) return Math.round(ago / 3600) + "h ago";
        return Math.round(ago / 86400) + "d ago";
      }

      function formatRunCard(run) {
        if (!run)
          return { value: "Never", sub: "No runs yet", tone: "default" };
        const tone =
          run.status === "error"
            ? "error"
            : run.status === "success"
              ? "success"
              : "default";
        return {
          value: formatRelativeTime(run.finishedAt || run.startedAt),
          sub:
            (run.status || "").toUpperCase() +
            (run.trigger ? " · " + run.trigger : ""),
          tone,
        };
      }

      function formatRestoreCard(restore) {
        if (!restore)
          return { value: "Never", sub: "No restores yet", tone: "default" };
        const tone =
          restore.status === "error"
            ? "error"
            : restore.status === "success"
              ? "success"
              : "default";
        const parts = [(restore.status || "").toUpperCase()];
        if (restore.mode) parts.push(restore.mode);
        if (restore.target) parts.push(restore.target);
        return {
          value: formatRelativeTime(restore.finishedAt || restore.startedAt),
          sub: parts.join(" · "),
          tone,
        };
      }

      function formatVerifyCard(verify) {
        if (!verify)
          return {
            value: "Never",
            sub: "No integrity checks yet",
            tone: "default",
          };
        const summary = verify.summary || {};
        const parts = [(verify.status || "").toUpperCase()];
        if (verify.target) parts.push(verify.target);
        const counts = [];
        if (summary.ok) counts.push(summary.ok + " ok");
        if (summary.corrupt) counts.push(summary.corrupt + " corrupt");
        if (summary.noBaseline)
          counts.push(summary.noBaseline + " no-baseline");
        if (counts.length) parts.push(counts.join(", "));
        let tone = "default";
        if (verify.status === "failure" || verify.status === "error")
          tone = "error";
        else if (verify.status === "warnings") tone = "warning";
        else if (verify.status === "success") tone = "success";
        return {
          value: formatRelativeTime(verify.finishedAt || verify.startedAt),
          sub: parts.join(" · "),
          tone,
        };
      }

      function toneToCardClass(tone) {
        if (tone === "success") return "teal";
        if (tone === "warning") return "gold";
        if (tone === "error") return "red";
        return "blue";
      }

      function toneToTextColor(tone) {
        if (tone === "success") return "#157457";
        if (tone === "warning") return "#8c6312";
        if (tone === "error") return "#b33f28";
        return "#446272";
      }

      function toneToTagColor(tone) {
        if (tone === "success") return "success";
        if (tone === "warning") return "warning";
        if (tone === "error") return "error";
        return "default";
      }

      function buildHistoryColumns() {
        return [
          {
            title: "When",
            dataIndex: "id",
            key: "id",
            render: (value) =>
              React.createElement(
                "span",
                null,
                new Date(value).toLocaleString(),
              ),
          },
          {
            title: "Type",
            dataIndex: "type",
            key: "type",
            render: (value) =>
              React.createElement(
                Tag,
                {
                  color: value === "full" ? "cyan" : "default",
                  bordered: false,
                },
                value,
              ),
          },
          {
            title: "Collections",
            dataIndex: "collections",
            key: "collections",
          },
          {
            title: "Size",
            dataIndex: "size",
            key: "size",
            render: (value) => formatBytes(value),
          },
        ];
      }

      function computeInFlightState(inFlight) {
        if (!inFlight) return null;

        const isRestore = inFlight.operation === "restore";
        const isVerify = inFlight.operation === "verify";
        const since = inFlight.startedAt ? new Date(inFlight.startedAt) : null;
        const elapsed = since
          ? Math.round((Date.now() - since.getTime()) / 1000)
          : 0;
        const elapsedText =
          elapsed < 60
            ? elapsed + "s"
            : elapsed < 3600
              ? Math.round(elapsed / 60) + "m " + (elapsed % 60) + "s"
              : Math.round(elapsed / 3600) +
                "h " +
                Math.round((elapsed % 3600) / 60) +
                "m";

        const lines = [];
        lines.push({ label: "Trigger", value: inFlight.trigger || "unknown" });
        lines.push({
          label: "Started",
          value:
            (since ? since.toLocaleTimeString() : "—") +
            " (" +
            elapsedText +
            " ago)",
        });
        if (inFlight.pid)
          lines.push({ label: "PID", value: String(inFlight.pid) });

        let progress = 0;
        let title = "Backup in progress";
        let type = "info";

        if (isVerify) {
          title = "Integrity verification in progress";
          type = "warning";
          if (inFlight.target)
            lines.push({ label: "Target", value: inFlight.target });
          if (inFlight.currentDb && inFlight.currentEntry) {
            lines.push({
              label: "Currently",
              value:
                inFlight.currentDb +
                " / " +
                new Date(inFlight.currentEntry).toLocaleString(),
            });
          }
          if (
            typeof inFlight.processedEntries === "number" &&
            typeof inFlight.totalEntries === "number" &&
            inFlight.totalEntries > 0
          ) {
            lines.push({
              label: "Progress",
              value:
                inFlight.processedEntries +
                1 +
                " / " +
                inFlight.totalEntries +
                " entries",
            });
            progress = Math.min(
              100,
              Math.round(
                (inFlight.processedEntries / inFlight.totalEntries) * 100,
              ),
            );
          }
        } else if (isRestore) {
          title = "Restore in progress";
          type = "warning";
          if (inFlight.target)
            lines.push({ label: "Target", value: inFlight.target });
          if (inFlight.mode)
            lines.push({ label: "Mode", value: inFlight.mode });
          if (inFlight.phase)
            lines.push({ label: "Phase", value: inFlight.phase });
          if (inFlight.currentDb && inFlight.currentEntry) {
            lines.push({
              label: "Replaying",
              value:
                inFlight.currentDb +
                " / " +
                new Date(inFlight.currentEntry).toLocaleString() +
                (inFlight.currentEntryType
                  ? " (" + inFlight.currentEntryType + ")"
                  : ""),
            });
          }
          if (
            typeof inFlight.processedSteps === "number" &&
            typeof inFlight.totalSteps === "number" &&
            inFlight.totalSteps > 0
          ) {
            lines.push({
              label: "Progress",
              value:
                inFlight.processedSteps +
                (inFlight.phase === "done" ? 0 : 1) +
                " / " +
                inFlight.totalSteps +
                " steps",
            });
            progress = Math.min(
              100,
              Math.round((inFlight.processedSteps / inFlight.totalSteps) * 100),
            );
          }
        } else {
          if (inFlight.currentDb && inFlight.currentCollection) {
            lines.push({
              label: "Currently",
              value: inFlight.currentDb + " / " + inFlight.currentCollection,
            });
          }
          if (
            typeof inFlight.processedCollections === "number" &&
            typeof inFlight.totalCollections === "number" &&
            inFlight.totalCollections > 0
          ) {
            lines.push({
              label: "Progress",
              value:
                inFlight.processedCollections +
                1 +
                " / " +
                inFlight.totalCollections +
                " collections",
            });
            progress = Math.min(
              100,
              Math.round(
                (inFlight.processedCollections / inFlight.totalCollections) *
                  100,
              ),
            );
          }
        }

        return { title, type, lines, progress };
      }

      function Dashboard() {
        const [statusData, setStatusData] = useState(null);
        const [restoreModalOpen, setRestoreModalOpen] = useState(false);
        const [restoreTarget, setRestoreTarget] = useState(null);
        const [restoreBackupId, setRestoreBackupId] = useState(null);
        const [openHistoryFor, setOpenHistoryFor] = useState({});
        const completionRef = useRef({
          firstSeen: false,
          scheduled: null,
          manual: null,
          restore: null,
          verify: null,
        });

        const pollStatus = async () => {
          const res = await fetch("/api/status");
          const data = await res.json();
          setStatusData((prev) => {
            detectCompletions(data, completionRef.current);
            return data;
          });
        };

        useEffect(() => {
          pollStatus().catch(() => {});
          const id = setInterval(() => pollStatus().catch(() => {}), 3000);
          return () => clearInterval(id);
        }, []);

        const detectCompletions = (data, state) => {
          const scheduled = data.runs?.scheduled?.finishedAt ?? null;
          const manual = data.runs?.manual?.finishedAt ?? null;
          const restore = data.lastRestore?.finishedAt ?? null;
          const verify = data.lastVerify?.finishedAt ?? null;

          if (state.firstSeen) {
            if (scheduled !== state.scheduled && data.runs?.scheduled)
              notifyCompletion("Scheduled backup", data.runs.scheduled);
            if (manual !== state.manual && data.runs?.manual)
              notifyCompletion("Manual backup", data.runs.manual);
            if (restore !== state.restore && data.lastRestore)
              notifyCompletion("Restore", data.lastRestore);
            if (verify !== state.verify && data.lastVerify)
              notifyCompletion("Verify", data.lastVerify);
          }
          state.firstSeen = true;
          state.scheduled = scheduled;
          state.manual = manual;
          state.restore = restore;
          state.verify = verify;
        };

        const notifyCompletion = (label, info) => {
          if (info.status === "success") {
            antd.message.success(label + " completed successfully");
          } else if (info.status === "warnings") {
            antd.message.warning(
              label +
                " completed with warnings (legacy entries without checksums)",
            );
          } else if (info.status === "failure") {
            const summary = info.summary || {};
            antd.message.error(
              label +
                " found corruption: " +
                (summary.corrupt || 0) +
                " entries, " +
                (summary.manifestErrors || 0) +
                " manifest errors",
            );
          } else if (info.status === "error") {
            antd.message.error(
              label + " failed: " + (info.error || "unknown error"),
            );
          }
        };

        const triggerAction = async (
          url,
          body,
          successText = "Action triggered",
        ) => {
          try {
            const res = await fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            if (res.ok) {
              antd.message.success(successText);
              pollStatus().catch(() => {});
            } else {
              const data = await res.json().catch(() => ({}));
              antd.message.error(data.error || "Action failed");
            }
          } catch {
            antd.message.error("Network error");
          }
        };

        const confirmLatestRestore = (target) => {
          Modal.confirm({
            title: "Restore to Latest",
            content:
              'This drops every collection in "' +
              target +
              '" and replays the chain up to the newest backup. Current live data in that database will be lost.',
            okText: "Start Restore",
            okButtonProps: { danger: true },
            cancelText: "Cancel",
            onOk: () =>
              triggerAction(
                "/api/trigger/restore",
                { type: "full", target },
                "Restore triggered",
              ),
          });
        };

        const openRestoreModalFor = (target) => {
          if (!statusData) return antd.message.error("No data available");
          const db = statusData.backups.find((entry) => entry.type === target);
          if (!db || !db.history.length)
            return antd.message.error("No backup history for " + target);
          setRestoreTarget(target);
          setRestoreBackupId(db.history[0].id);
          setRestoreModalOpen(true);
        };

        const confirmRestorePoint = () => {
          if (!restoreTarget || !restoreBackupId) return;
          const when = new Date(restoreBackupId).toLocaleString();
          Modal.confirm({
            title: "Restore to Point in Time",
            content:
              'This drops every collection in "' +
              restoreTarget +
              '" and restores the exact state captured at ' +
              when +
              ". Data written after that point will be lost.",
            okText: "Start Restore",
            okButtonProps: { danger: true },
            cancelText: "Cancel",
            onOk: async () => {
              setRestoreModalOpen(false);
              await triggerAction(
                "/api/trigger/restore",
                {
                  type: "full",
                  target: restoreTarget,
                  backupId: restoreBackupId,
                },
                "Point-in-time restore triggered",
              );
            },
          });
        };

        const totalDisk = useMemo(() => {
          if (!statusData) return 0;
          return statusData.backups.reduce(
            (sum, db) => sum + (db.totalSize || 0),
            0,
          );
        }, [statusData]);

        const totalCount = useMemo(() => {
          if (!statusData) return 0;
          return statusData.backups.reduce(
            (sum, db) => sum + (db.count || 0),
            0,
          );
        }, [statusData]);

        const overviewCards = useMemo(() => {
          if (!statusData) return [];
          return [
            {
              key: "schedule",
              title: "Schedule",
              value: statusData.scheduler.cron,
              sub: "Cron expression driving scheduled backup runs.",
              tone: "blue",
            },
            {
              key: "scheduled",
              title: "Last Scheduled Run",
              ...formatRunCard(statusData.runs?.scheduled),
            },
            {
              key: "manual",
              title: "Last Manual Run",
              ...formatRunCard(statusData.runs?.manual),
            },
            {
              key: "restore",
              title: "Last Restore",
              ...formatRestoreCard(statusData.lastRestore),
            },
            {
              key: "verify",
              title: "Last Verify",
              ...formatVerifyCard(statusData.lastVerify),
            },
            {
              key: "disk",
              title: "Total Disk Usage",
              value: formatBytes(totalDisk),
              sub:
                totalCount +
                " backups across " +
                statusData.backups.length +
                " database" +
                (statusData.backups.length === 1 ? "" : "s") +
                ".",
              tone: "teal",
            },
          ];
        }, [statusData, totalDisk, totalCount]);

        const inFlightView = computeInFlightState(statusData?.inFlight);
        const historyColumns = useMemo(() => buildHistoryColumns(), []);

        const renderHero = () =>
          React.createElement(
            Card,
            { className: "hero-card", bordered: false },
            React.createElement(
              "div",
              { className: "hero-topbar" },
              React.createElement(
                "div",
                { className: "hero-kicker" },
                "CrashSafe Control Surface",
              ),
              React.createElement(
                Tag,
                {
                  color: statusData?.scheduler?.running ? "success" : "default",
                  bordered: false,
                  style: {
                    paddingInline: 14,
                    paddingBlock: 8,
                    borderRadius: 999,
                    fontWeight: 800,
                    letterSpacing: "0.12em",
                    textTransform: "uppercase",
                  },
                },
                statusData?.scheduler?.running
                  ? "Scheduler Active"
                  : "Scheduler Stopped",
              ),
            ),
            React.createElement(
              "div",
              { className: "hero-grid" },
              React.createElement(
                "div",
                { className: "hero-copy" },
                React.createElement("h1", null, "CrashSafe"),
              ),
              React.createElement(
                "div",
                { className: "hero-rail" },
                React.createElement(
                  "div",
                  { className: "hero-rail-card" },
                  React.createElement(
                    "div",
                    { className: "eyebrow" },
                    "Runtime",
                  ),
                  React.createElement(
                    "div",
                    { className: "value" },
                    statusData?.inFlight
                      ? "Operation in progress"
                      : "System idle",
                  ),
                  React.createElement(
                    "div",
                    { className: "hint" },
                    statusData?.inFlight
                      ? "A running task is currently visible below with live progress."
                      : "No backup, restore or verify operation is active right now.",
                  ),
                ),
                React.createElement(
                  "div",
                  { className: "hero-rail-card" },
                  React.createElement(
                    "div",
                    { className: "eyebrow" },
                    "Storage",
                  ),
                  React.createElement(
                    "div",
                    { className: "value" },
                    formatBytes(totalDisk),
                  ),
                  React.createElement(
                    "div",
                    { className: "hint" },
                    totalCount +
                      " retained backup entries across all configured databases.",
                  ),
                ),
              ),
            ),
          );

        const renderInFlight = () => {
          if (!inFlightView) return null;
          return React.createElement(
            Card,
            { className: "surface-card section-block", bordered: false },
            React.createElement(Alert, {
              type: inFlightView.type,
              showIcon: true,
              banner: true,
              message: React.createElement(
                Text,
                { strong: true },
                inFlightView.title,
              ),
              description: React.createElement(
                "div",
                null,
                React.createElement(
                  "div",
                  { className: "overlay-meta" },
                  inFlightView.lines.map((line) =>
                    React.createElement(
                      "div",
                      { className: "overlay-meta-line", key: line.label },
                      React.createElement("strong", null, line.label + ": "),
                      line.value,
                    ),
                  ),
                ),
                React.createElement(Progress, {
                  percent: inFlightView.progress,
                  showInfo: false,
                  strokeColor:
                    inFlightView.type === "warning" ? "#d9a11e" : "#1f9d77",
                  trailColor: "rgba(16, 33, 43, 0.08)",
                  size: "small",
                  style: { marginTop: 16 },
                }),
              ),
            }),
          );
        };

        const renderMetrics = () =>
          React.createElement(
            "div",
            { className: "section-block" },
            React.createElement(
              "div",
              { className: "section-head" },
              React.createElement(
                "div",
                { className: "section-label" },
                "Overview",
              ),
            ),
            React.createElement(
              "div",
              { className: "stats-grid" },
              overviewCards.map((card) =>
                React.createElement(
                  Card,
                  {
                    key: card.key,
                    bordered: false,
                    className:
                      "metric-card " + toneToCardClass(card.tone || "blue"),
                  },
                  React.createElement(Statistic, {
                    title: card.title,
                    value: card.value,
                    valueStyle: { color: "#10212b" },
                  }),
                  React.createElement(
                    "div",
                    {
                      className: "metric-sub",
                      style: { color: toneToTextColor(card.tone || "default") },
                    },
                    card.sub,
                  ),
                ),
              ),
            ),
          );

        const renderDatabaseCard = (db) => {
          const lastDate = db.lastBackup
            ? new Date(db.lastBackup).toLocaleString()
            : "Never";
          const historyData = (db.history || [])
            .slice(0, 50)
            .map((entry) => ({ ...entry, key: entry.id }));
          const dbConfig = statusData?.config || {};
          const configName =
            db.type === "data" ? dbConfig.dbData : dbConfig.dbParse;
          const tagColor = db.type === "data" ? "green" : "blue";
          const isOpen = !!openHistoryFor[db.type];

          return React.createElement(
            Card,
            { key: db.type, bordered: false, className: "db-card" },
            React.createElement(
              "div",
              { className: "db-header" },
              React.createElement(
                "div",
                null,
                React.createElement(
                  "div",
                  { className: "db-title" },
                  React.createElement(
                    "div",
                    { className: "db-name" },
                    configName || db.name,
                  ),
                  React.createElement(
                    Tag,
                    { color: tagColor, bordered: false },
                    db.type,
                  ),
                ),
                React.createElement(
                  "div",
                  { className: "db-meta" },
                  "Last backup: ",
                  React.createElement("span", { className: "mono" }, lastDate),
                  React.createElement("br"),
                  "Stored on disk: ",
                  React.createElement(
                    "span",
                    { className: "mono" },
                    formatBytes(db.totalSize),
                  ),
                ),
              ),
              React.createElement(
                "div",
                { className: "db-count" },
                React.createElement("div", { className: "big" }, db.count),
                React.createElement(
                  "div",
                  { className: "small" },
                  "backup" + (db.count === 1 ? "" : "s") + " retained",
                ),
              ),
            ),
            React.createElement(
              "div",
              { className: "action-grid" },
              React.createElement(
                Button,
                {
                  onClick: () =>
                    triggerAction(
                      "/api/trigger/backup",
                      { type: "incremental", target: db.type },
                      "Incremental backup triggered",
                    ),
                },
                "Incremental Backup",
              ),
              React.createElement(
                Button,
                {
                  type: "primary",
                  onClick: () =>
                    triggerAction(
                      "/api/trigger/backup",
                      { type: "full", target: db.type },
                      "Full backup triggered",
                    ),
                },
                "Full Backup",
              ),
              React.createElement(
                Button,
                {
                  onClick: () =>
                    triggerAction(
                      "/api/trigger/verify",
                      { target: db.type },
                      "Integrity verification triggered",
                    ),
                },
                "Verify Integrity",
              ),
              React.createElement(
                Button,
                { danger: true, onClick: () => openRestoreModalFor(db.type) },
                "Restore to Point",
              ),
              React.createElement(
                Button,
                {
                  danger: true,
                  ghost: true,
                  style: { gridColumn: "1 / -1" },
                  onClick: () => confirmLatestRestore(db.type),
                },
                "Restore to Latest",
              ),
            ),
            React.createElement(
              "div",
              { className: "db-help" },
              React.createElement(List, {
                size: "small",
                split: true,
                dataSource: [
                  {
                    key: "inc",
                    title: "Incremental Backup",
                    tag: React.createElement(
                      Tag,
                      { color: "default", bordered: false },
                      "Delta",
                    ),
                    copy: "Dumps only documents changed since the previous entry and tracks deletes. Faster, smaller, chain-based.",
                  },
                  {
                    key: "full",
                    title: "Full Backup",
                    tag: React.createElement(
                      Tag,
                      { color: "green", bordered: false },
                      "Checkpoint",
                    ),
                    copy: "Re-dumps everything and creates a fresh restore checkpoint. Slower, but cleaner as a recovery anchor.",
                  },
                  {
                    key: "restore",
                    title: "Restore",
                    tag: React.createElement(
                      Tag,
                      { color: "red", bordered: false },
                      "Destructive",
                    ),
                    copy: "Drops the live database and rebuilds it from the chosen chain segment. Backup files on disk remain untouched.",
                  },
                ],
                renderItem: (item) =>
                  React.createElement(
                    List.Item,
                    { key: item.key },
                    React.createElement(
                      "div",
                      null,
                      React.createElement(
                        "div",
                        { className: "item-title" },
                        item.title,
                        item.tag,
                      ),
                      React.createElement(
                        "div",
                        { className: "item-copy" },
                        item.copy,
                      ),
                    ),
                  ),
              }),
            ),
            React.createElement(
              "div",
              { className: "chain-note" },
              React.createElement("strong", null, "Restore chain semantics"),
              React.createElement(
                "span",
                null,
                "A restore only replays from the most recent full backup at or before the target entry through the target itself. Older full chains are ignored.",
              ),
            ),
            React.createElement(
              Card,
              { className: "history-card", bordered: false },
              React.createElement(
                "div",
                { className: "history-title" },
                React.createElement("span", null, "Backup History"),
                React.createElement(
                  Button,
                  {
                    type: "text",
                    size: "small",
                    onClick: () =>
                      setOpenHistoryFor((prev) => ({
                        ...prev,
                        [db.type]: !prev[db.type],
                      })),
                  },
                  isOpen ? "Hide" : "Show",
                ),
              ),
              isOpen
                ? historyData.length
                  ? React.createElement(Table, {
                      className: "custom-table",
                      columns: historyColumns,
                      dataSource: historyData,
                      pagination: false,
                      size: "small",
                      scroll: { x: true },
                    })
                  : React.createElement(
                      "div",
                      { className: "empty-hint" },
                      "No backups yet.",
                    )
                : React.createElement(
                    "div",
                    { className: "empty-hint" },
                    db.count +
                      " entr" +
                      (db.count === 1 ? "y" : "ies") +
                      " available.",
                  ),
            ),
          );
        };

        if (!statusData) {
          return React.createElement(
            "div",
            { className: "app-shell" },
            React.createElement(
              "div",
              { className: "page-wrap" },
              React.createElement(Card, {
                className: "hero-card",
                bordered: false,
                loading: true,
              }),
            ),
          );
        }

        const restoreOptions = (
          statusData.backups.find((entry) => entry.type === restoreTarget)
            ?.history || []
        ).map((entry) => ({
          value: entry.id,
          label:
            new Date(entry.id).toLocaleString() +
            (entry.type === "full" ? " · Full" : " · Incremental"),
        }));

        return React.createElement(
          "div",
          { className: "app-shell" },
          React.createElement(
            "div",
            { className: "page-wrap" },
            renderHero(),
            renderInFlight(),
            renderMetrics(),
            React.createElement(
              "div",
              { className: "section-block" },
              React.createElement(
                "div",
                { className: "section-head" },
                React.createElement(
                  "div",
                  { className: "section-label" },
                  "Databases",
                ),
              ),
              React.createElement(
                "div",
                { className: "db-grid" },
                statusData.backups.map(renderDatabaseCard),
              ),
            ),
            React.createElement(
              "div",
              { className: "footer-note" },
              "Live status continues to poll every 3 seconds. API endpoints and backend behavior are unchanged.",
            ),
          ),
          React.createElement(
            Modal,
            {
              title: "Restore to a point in time",
              open: restoreModalOpen,
              okText: "Continue",
              cancelText: "Cancel",
              okButtonProps: { danger: true, disabled: !restoreBackupId },
              onOk: confirmRestorePoint,
              onCancel: () => setRestoreModalOpen(false),
            },
            React.createElement(
              Paragraph,
              {
                style: { color: "#5e7381", lineHeight: 1.7, marginBottom: 18 },
              },
              "This action drops every collection in the selected database and restores the exact state stored at the chosen backup entry.",
            ),
            React.createElement(
              "label",
              { className: "restore-select-label" },
              "Backup entry",
            ),
            React.createElement(Select, {
              value: restoreBackupId,
              options: restoreOptions,
              style: { width: "100%" },
              onChange: setRestoreBackupId,
              placeholder: "Choose a backup entry",
            }),
          ),
        );
      }

      const crashsafeTheme = {
        algorithm: theme.defaultAlgorithm,
        token: {
          colorPrimary: "#1f9d77",
          colorInfo: "#2f8fc7",
          colorSuccess: "#1f9d77",
          colorWarning: "#d6a321",
          colorError: "#d45b44",
          borderRadius: 20,
          fontFamily: "Plus Jakarta Sans, sans-serif",
          colorText: "#10212b",
          colorTextSecondary: "#6f8391",
          colorBgLayout: "transparent",
          colorBgContainer: "rgba(255,255,255,0.84)",
          colorBorderSecondary: "rgba(16, 33, 43, 0.08)",
          boxShadowSecondary: "0 24px 80px rgba(16, 33, 43, 0.08)",
        },
        components: {
          Card: {
            bodyPadding: 20,
          },
          Button: {
            fontWeight: 700,
            primaryShadow: "0 12px 30px rgba(31, 157, 119, 0.22)",
          },
          Table: {
            headerBg: "transparent",
            rowHoverBg: "rgba(31, 157, 119, 0.04)",
          },
          Modal: {
            contentBg: "#ffffff",
            headerBg: "#ffffff",
          },
          Alert: {
            borderRadiusLG: 20,
          },
          Tag: {
            fontWeight: 700,
          },
        },
      };

      ReactDOM.createRoot(document.getElementById("root")).render(
        React.createElement(
          ConfigProvider,
          { theme: crashsafeTheme },
          React.createElement(AntdApp, null, React.createElement(Dashboard)),
        ),
      );
    </script>
  </body>
</html>
